<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sniper Battle</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
body { background: #0a0a0f; color: #fff; font-family: Arial, sans-serif; overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; }

#menu {
    background: linear-gradient(180deg, #1a1a2e, #16213e);
    border: 2px solid #0f3460;
    border-radius: 20px;
    padding: 40px;
    text-align: center;
    width: 400px;
    box-shadow: 0 0 60px rgba(15,52,96,0.3);
}

#menu h1 {
    font-size: 32px;
    text-transform: uppercase;
    letter-spacing: 4px;
    margin-bottom: 5px;
    background: linear-gradient(135deg, #e94560, #0f3460);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

#menu .subtitle {
    font-size: 12px;
    color: #888;
    margin-bottom: 30px;
    letter-spacing: 6px;
}

.btn {
    display: block;
    width: 100%;
    padding: 14px;
    margin: 10px 0;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
}

.btn:hover { transform: translateY(-2px); }
.btn:active { transform: scale(0.97); }

.btn-create { background: linear-gradient(135deg, #e94560, #c23152); color: #fff; }
.btn-join { background: linear-gradient(135deg, #0f3460, #1a5276); color: #fff; }
.btn-copy { background: #2d2d44; color: #fff; font-size: 14px; padding: 10px; }

#menu input {
    width: 100%;
    padding: 14px;
    margin: 10px 0;
    border: 2px solid #0f3460;
    border-radius: 10px;
    background: #1a1a2e;
    color: #fff;
    font-size: 18px;
    text-align: center;
    letter-spacing: 4px;
    outline: none;
}

#menu input:focus { border-color: #e94560; }

#roomCode {
    font-size: 36px;
    letter-spacing: 8px;
    font-weight: bold;
    color: #e94560;
    margin: 15px 0;
    padding: 15px;
    background: rgba(0,0,0,0.3);
    border-radius: 10px;
}

.status {
    font-size: 13px;
    color: #aaa;
    margin: 10px 0;
    min-height: 20px;
}

.error { color: #e94560; }
.success { color: #4ecca3; }

#game {
    display: none;
    width: 100vw;
    height: 100vh;
    position: relative;
    background: linear-gradient(180deg, #0f0f23, #1a1a35);
    cursor: crosshair;
}

#gameCanvas {
    display: block;
    width: 100%;
    height: 100%;
}

#hud {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 30px;
    background: rgba(0,0,0,0.7);
    padding: 12px 30px;
    border-radius: 15px;
    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
}

.hud-item {
    text-align: center;
}

.hud-item .label {
    font-size: 10px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 2px;
}

.hud-item .value {
    font-size: 22px;
    font-weight: bold;
    margin-top: 2px;
}

#healthBar {
    position: absolute;
    top: 20px;
    left: 20px;
    width: 200px;
}

#healthBg {
    width: 100%;
    height: 12px;
    background: rgba(255,255,255,0.1);
    border-radius: 6px;
    overflow: hidden;
}

#healthFill {
    height: 100%;
    background: linear-gradient(90deg, #e94560, #4ecca3);
    border-radius: 6px;
    transition: width 0.3s;
    width: 100%;
}

#healthLabel {
    font-size: 12px;
    color: #aaa;
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 1px;
}

#ammoDisplay {
    position: absolute;
    top: 20px;
    right: 20px;
    text-align: right;
}

#ammoDisplay .value {
    font-size: 42px;
    font-weight: bold;
}

#ammoDisplay .label {
    font-size: 11px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 2px;
}

#reloadIndicator {
    display: none;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 24px;
    text-transform: uppercase;
    letter-spacing: 4px;
    color: #e94560;
    background: rgba(0,0,0,0.8);
    padding: 15px 30px;
    border-radius: 10px;
    border: 2px solid #e94560;
}

#deathScreen {
    display: none;
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.85);
    align-items: center;
    justify-content: center;
    flex-direction: column;
    z-index: 100;
}

#deathScreen h1 { font-size: 48px; color: #e94560; margin-bottom: 10px; }
#deathScreen p { font-size: 18px; color: #aaa; margin-bottom: 30px; }
#deathScreen .btn { width: 200px; margin: 0 auto; }

#killFeed {
    position: absolute;
    top: 60px;
    right: 20px;
    font-size: 13px;
    text-align: right;
    z-index: 50;
}

#killFeed div {
    background: rgba(0,0,0,0.6);
    padding: 5px 12px;
    margin: 3px 0;
    border-radius: 6px;
    border-left: 3px solid #e94560;
}

#hitMarker {
    display: none;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 60px;
    color: #e94560;
    pointer-events: none;
    z-index: 50;
}

.disconnected { color: #888; font-style: italic; }
.hidden { display: none !important; }
</style>
</head>
<body>

<div id="menu">
    <h1>SNIPER BATTLE</h1>
    <div class="subtitle">P2P MULTIPLAYER</div>
    <button class="btn btn-create" onclick="createGame()">Создать игру</button>
    <div style="margin: 15px 0; color: #555;">или</div>
    <input id="joinInput" type="text" placeholder="Код комнаты" maxlength="6" oninput="this.value=this.value.toUpperCase()">
    <button class="btn btn-join" onclick="joinGame()">Присоединиться</button>
    <div id="status" class="status">Готов к бою</div>
</div>

<div id="game">
    <canvas id="gameCanvas"></canvas>
    
    <div id="healthBar">
        <div id="healthBg"><div id="healthFill"></div></div>
        <div id="healthLabel">HP: 100%</div>
    </div>
    
    <div id="ammoDisplay">
        <div class="value" id="ammoCount">5</div>
        <div class="label">/ 5</div>
    </div>
    
    <div id="reloadIndicator">Перезарядка...</div>
    <div id="hitMarker">&#10005;</div>
    <div id="killFeed"></div>
    
    <div id="hud">
        <div class="hud-item">
            <div class="label">Противник</div>
            <div class="value" id="enemyHealthHud" style="color:#e94560;">100%</div>
        </div>
        <div class="hud-item">
            <div class="label">Раунд</div>
            <div class="value" id="roundHud" style="color:#4ecca3;">1</div>
        </div>
        <div class="hud-item">
            <div class="label">Счет</div>
            <div class="value" id="scoreHud">0:0</div>
        </div>
    </div>
    
    <div id="deathScreen">
        <h1>Ты убит</h1>
        <p id="deathMsg">Снайпер был точнее</p>
        <button class="btn btn-create" onclick="requestRestart()">Реванш</button>
    </div>
</div>

<script>
// ====================================================
// GAME ENGINE
// ====================================================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// ====================================================
// GAME STATE
// ====================================================
let gameState = 'menu'; // menu, searching, playing, dead
let peer = null;
let conn = null;
let myId = '';
let myPeerId = '';
let gameId = '';

const state = {
    players: {
        me: { x: 0, y: 0, health: 100, maxHealth: 100, ammo: 5, maxAmmo: 5, reloading: false, reloadTime: 0, angle: 0, scope: false, alive: true, kills: 0, username: 'You' },
        enemy: { x: 0, y: 0, health: 100, maxHealth: 100, ammo: 5, maxAmmo: 5, reloading: false, reloadTime: 0, angle: 0, scope: false, alive: true, kills: 0, username: 'Enemy' }
    },
    round: 1,
    myScore: 0,
    enemyScore: 0,
    winner: null,
    mapSeed: Math.random() * 10000
};

let mouse = { x: W/2, y: H/2 };
let keys = {};
let bullets = [];
let particles = [];
let scopeActive = false;
let shotCooldown = 0;
let lastShotTime = 0;

// ====================================================
// MAP GENERATION
// ====================================================
let mapData = { buildings: [], cover: [] };

function generateMap() {
    mapData = { buildings: [], cover: [] };
    const seed = state.mapSeed;
    let rng = seed;
    function rand() { rng = (rng * 9301 + 49297) % 233280; return rng / 233280; }
    
    const baseY = H * 0.75;
    
    // Ground
    mapData.groundY = baseY;
    
    // Buildings - both sides
    // Left side (sniping positions)
    mapData.buildings.push({ x: 0, y: baseY - 120, w: 120, h: 120 });
    mapData.buildings.push({ x: 60, y: baseY - 200, w: 80, h: 80 });
    mapData.buildings.push({ x: 0, y: baseY - 60, w: 150, h: 60 });
    
    // Right side
    mapData.buildings.push({ x: W - 130, y: baseY - 130, w: 130, h: 130 });
    mapData.buildings.push({ x: W - 150, y: baseY - 220, w: 90, h: 90 });
    mapData.buildings.push({ x: W - 160, y: baseY - 60, w: 160, h: 60 });
    
    // Center buildings (cover)
    for (let i = 0; i < 5; i++) {
        const bx = 120 + rand() * (W - 240);
        const bw = 30 + rand() * 50;
        const bh = 30 + rand() * 80;
        mapData.buildings.push({ x: bx, y: baseY - bh, w: bw, h: bh });
    }
    
    // Small cover
    for (let i = 0; i < 8; i++) {
        const cx = rand() * W;
        const ch = 10 + rand() * 25;
        mapData.cover.push({ x: cx, y: baseY - ch, w: 15 + rand() * 30, h: ch });
    }
    
    // Set spawn positions
    state.players.me.x = 0;
    state.players.me.y = baseY - 200;
    state.players.enemy.x = W;
    state.players.enemy.y = baseY - 220;
}

function getSniperPos(side, baseY) {
    if (side === 'left') {
        return { x: 50 + Math.random() * 60, y: baseY - 140 - Math.random() * 60 };
    } else {
        return { x: W - 50 - Math.random() * 60, y: baseY - 140 - Math.random() * 60 };
    }
}

// ====================================================
// PHYSICS & COLLISION
// ====================================================
function pointInRect(px, py, r) {
    return px >= r.x && px <= r.x + r.w && py >= r.y && py <= r.y + r.h;
}

function lineIntersectsRect(x1, y1, x2, y2, r) {
    const dx = x2 - x1, dy = y2 - y1;
    const steps = Math.max(Math.abs(dx), Math.abs(dy));
    for (let i = 0; i <= steps; i++) {
        const t = i / steps;
        const px = x1 + dx * t;
        const py = y1 + dy * t;
        if (pointInRect(px, py, r)) return true;
    }
    return false;
}

function lineIntersectsAny(x1, y1, x2, y2) {
    for (const b of mapData.buildings) {
        if (lineIntersectsRect(x1, y1, x2, y2, b)) return true;
    }
    return false;
}

// ====================================================
// PLAYER UPDATE
// ====================================================
function updatePlayer(dt) {
    const me = state.players.me;
    const enemy = state.players.enemy;
    
    // Aim angle
    if (me.alive) {
        const dx = mouse.x - me.x;
        const dy = mouse.y - me.y;
        me.angle = Math.atan2(dy, dx);
        
        // Scope
        scopeActive = mouse.right || keys['Shift'];
        me.scope = scopeActive;
    }
    
    // Reload
    if (me.reloading) {
        me.reloadTime -= dt;
        if (me.reloadTime <= 0) {
            me.ammo = me.maxAmmo;
            me.reloading = false;
            document.getElementById('reloadIndicator').style.display = 'none';
            sendState();
        }
    }
    
    // Shot cooldown
    if (shotCooldown > 0) shotCooldown -= dt;
    
    // Bullets
    for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        b.x += b.vx * dt;
        b.y += b.vy * dt;
        b.vy += 200 * dt; // gravity
        b.life -= dt;
        
        // Hit building
        let hitSomething = false;
        for (const build of mapData.buildings) {
            if (pointInRect(b.x, b.y, build)) {
                spawnParticles(b.x, b.y, '#ff6b35', 10);
                hitSomething = true;
                break;
            }
        }
        
        // Hit enemy
        if (!hitSomething && b.owner === 'me' && enemy.alive) {
            const dist = Math.sqrt((b.x - enemy.x)**2 + (b.y - enemy.y)**2);
            const scopeMult = b.scoped ? 1.3 : 1;
            if (dist < 40 * scopeMult) {
                hitSomething = true;
                const dmg = Math.round(40 + Math.random() * 20);
                enemy.health -= dmg;
                spawnParticles(b.x, b.y, '#e94560', 20);
                showHitMarker();
                
                if (enemy.health <= 0) {
                    enemy.health = 0;
                    enemy.alive = false;
                    state.myScore++;
                    me.kills++;
                    spawnParticles(enemy.x, enemy.y, '#ff0000', 50);
                    state.winner = 'me';
                    endRound();
                }
                
                sendState();
            }
        }
        
        // Hit me
        if (!hitSomething && b.owner === 'enemy' && me.alive) {
            const dist = Math.sqrt((b.x - me.x)**2 + (b.y - me.y)**2);
            const scopeMult = b.scoped ? 1.3 : 1;
            if (dist < 40 * scopeMult) {
                hitSomething = true;
                const dmg = Math.round(35 + Math.random() * 25);
                me.health -= dmg;
                spawnParticles(b.x, b.y, '#e94560', 20);
                screenShake(5);
                
                if (me.health <= 0) {
                    me.health = 0;
                    me.alive = false;
                    state.enemyScore++;
                    state.winner = 'enemy';
                    spawnParticles(me.x, me.y, '#ff0000', 50);
                    endRound();
                }
                
                updateHUD();
                sendState();
            }
        }
        
        if (hitSomething || b.life <= 0) {
            bullets.splice(i, 1);
            continue;
        }
        
        // Ground hit
        if (b.y > mapData.groundY) {
            spawnParticles(b.x, mapData.groundY, '#8B4513', 8);
            bullets.splice(i, 1);
        }
    }
    
    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vy += 300 * dt;
        p.life -= dt;
        if (p.life <= 0) particles.splice(i, 1);
    }
    
    updateHUD();
}

// ====================================================
// SHOOTING
// ====================================================
function shoot() {
    const me = state.players.me;
    if (!me.alive || me.ammo <= 0 || me.reloading || shotCooldown > 0) return;
    
    me.ammo--;
    shotCooldown = 0.5;
    
    const speed = scopeActive ? 1800 : 1200;
    const spread = scopeActive ? 0.01 : 0.05;
    const angle = me.angle + (Math.random() - 0.5) * spread;
    
    bullets.push({
        x: me.x + Math.cos(me.angle) * 40,
        y: me.y + Math.sin(me.angle) * 40,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        owner: 'me',
        scoped: scopeActive,
        life: 3
    });
    
    spawnParticles(me.x + Math.cos(me.angle) * 40, me.y + Math.sin(me.angle) * 40, '#ffdd00', 5);
    screenShake(3);
    
    if (me.ammo <= 0) startReload();
    
    updateHUD();
    sendState();
    sendBullet(angle, speed, scopeActive);
}

function startReload() {
    const me = state.players.me;
    if (me.reloading) return;
    me.reloading = true;
    me.reloadTime = 2.0;
    document.getElementById('reloadIndicator').style.display = 'block';
    sendState();
}

// ====================================================
// RENDERING
// ====================================================
function render() {
    ctx.clearRect(0, 0, W, H);
    
    // Sky gradient
    const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
    skyGrad.addColorStop(0, '#0a0a1a');
    skyGrad.addColorStop(0.5, '#1a1a3a');
    skyGrad.addColorStop(1, '#2a2a4a');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, W, H);
    
    // Stars
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    for (let i = 0; i < 100; i++) {
        const sx = (state.mapSeed * (i+1) * 7.3) % W;
        const sy = (state.mapSeed * (i+1) * 3.1) % (H * 0.6);
        const ss = 0.5 + (state.mapSeed * (i+1) % 3) * 0.5;
        ctx.fillRect(sx, sy, ss, ss);
    }
    
    // Moon
    ctx.fillStyle = 'rgba(200,200,255,0.1)';
    ctx.beginPath();
    ctx.arc(W * 0.8, 60, 40, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(200,200,255,0.15)';
    ctx.beginPath();
    ctx.arc(W * 0.8, 60, 30, 0, Math.PI * 2);
    ctx.fill();
    
    // Ground
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, mapData.groundY, W, H - mapData.groundY);
    ctx.strokeStyle = '#2a2a4e';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, mapData.groundY);
    ctx.lineTo(W, mapData.groundY);
    ctx.stroke();
    
    // Buildings
    for (const b of mapData.buildings) {
        ctx.fillStyle = '#1e1e35';
        ctx.fillRect(b.x, b.y, b.w, b.h);
        ctx.strokeStyle = '#2a2a4e';
        ctx.lineWidth = 1;
        ctx.strokeRect(b.x, b.y, b.w, b.h);
        
        // Windows
        ctx.fillStyle = 'rgba(255,200,50,0.08)';
        for (let wy = b.y + 10; wy < b.y + b.h - 10; wy += 25) {
            for (let wx = b.x + 8; wx < b.x + b.w - 8; wx += 22) {
                ctx.fillRect(wx, wy, 12, 15);
            }
        }
    }
    
    // Small cover
    for (const c of mapData.cover) {
        ctx.fillStyle = '#282840';
        ctx.fillRect(c.x, c.y, c.w, c.h);
        ctx.strokeStyle = '#333355';
        ctx.lineWidth = 1;
        ctx.strokeRect(c.x, c.y, c.w, c.h);
    }
    
    const me = state.players.me;
    const enemy = state.players.enemy;
    
    // Bullet tracers
    for (const b of bullets) {
        ctx.strokeStyle = b.owner === 'me' ? 'rgba(255,200,50,0.8)' : 'rgba(255,50,50,0.8)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(b.x, b.y);
        ctx.lineTo(b.x - b.vx * 0.02, b.y - b.vy * 0.02);
        ctx.stroke();
        
        ctx.fillStyle = b.owner === 'me' ? '#ffdd00' : '#ff4444';
        ctx.beginPath();
        ctx.arc(b.x, b.y, 3, 0, Math.PI * 2);
        ctx.fill();
    }
    
    // Particles
    for (const p of particles) {
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.life;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.globalAlpha = 1;
    
    // Enemy sniper
    if (enemy.alive) {
        drawSniper(enemy.x, enemy.y, enemy.angle, false, '#ff4444');
        
        // Enemy health bar above
        const barW = 40;
        const barH = 4;
        const barX = enemy.x - barW/2;
        const barY = enemy.y - 50;
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(barX, barY, barW, barH);
        ctx.fillStyle = '#e94560';
        ctx.fillRect(barX, barY, barW * (enemy.health / enemy.maxHealth), barH);
    }
    
    // My sniper
    if (me.alive) {
        drawSniper(me.x, me.y, me.angle, true, '#4ecca3');
    }
    
    // Scope overlay
    if (scopeActive && me.alive) {
        const scopeSize = Math.min(W, H) * 0.35;
        const sx = W/2;
        const sy = H/2;
        
        // Darken outside scope
        ctx.fillStyle = 'rgba(0,0,0,0.85)';
        ctx.beginPath();
        ctx.rect(0, 0, W, H);
        ctx.arc(sx, sy, scopeSize/2, 0, Math.PI*2, true);
        ctx.fill();
        
        // Scope crosshair
        ctx.strokeStyle = 'rgba(255,255,255,0.6)';
        ctx.lineWidth = 1;
        // Horizontal
        ctx.beginPath();
        ctx.moveTo(sx - scopeSize/2, sy);
        ctx.lineTo(sx + scopeSize/2, sy);
        ctx.stroke();
        // Vertical
        ctx.beginPath();
        ctx.moveTo(sx, sy - scopeSize/2);
        ctx.lineTo(sx, sy + scopeSize/2);
        ctx.stroke();
        
        // Center dot
        ctx.fillStyle = 'rgba(255,0,0,0.8)';
        ctx.beginPath();
        ctx.arc(sx, sy, 2, 0, Math.PI*2);
        ctx.fill();
        
        // Scope circle
        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(sx, sy, scopeSize/2, 0, Math.PI*2);
        ctx.stroke();
        
        // Distance indicator
        const dx = enemy.x - me.x;
        const dy = enemy.y - me.y;
        const dist = Math.sqrt(dx*dx + dy*dy) / 10;
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.font = '12px monospace';
        ctx.textAlign = 'center';
        ctx.fillText(`${Math.round(dist)}m`, sx, sy + scopeSize/2 + 20);
    }
    
    // Death screen handled by div
}

function drawSniper(x, y, angle, isMe, color) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);
    
    // Body
    ctx.fillStyle = isMe ? '#1a3a2a' : '#3a1a1a';
    ctx.fillRect(-8, -12, 16, 24);
    
    // Head
    ctx.fillStyle = '#2a2a3a';
    ctx.beginPath();
    ctx.arc(0, -18, 10, 0, Math.PI * 2);
    ctx.fill();
    
    // Gun (sniper rifle)
    ctx.fillStyle = '#3a3a4a';
    ctx.fillRect(12, -3, 40, 6);
    ctx.fillRect(10, -4, 6, 8);
    
    // Scope on gun
    ctx.fillStyle = '#1a1a2a';
    ctx.fillRect(25, -6, 10, 12);
    
    ctx.restore();
}

// ====================================================
// PARTICLES
// ====================================================
function spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 50 + Math.random() * 200;
        particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            color,
            size: 1 + Math.random() * 3,
            life: 0.3 + Math.random() * 0.5
        });
    }
}

// ====================================================
// HUD
// ====================================================
let shakeAmount = 0;
function screenShake(amount) { shakeAmount = Math.max(shakeAmount, amount); }

function showHitMarker() {
    const hm = document.getElementById('hitMarker');
    hm.style.display = 'block';
    setTimeout(() => hm.style.display = 'none', 200);
}

function updateHUD() {
    const me = state.players.me;
    const enemy = state.players.enemy;
    
    document.getElementById('healthFill').style.width = `${me.health}%`;
    document.getElementById('healthLabel').textContent = `HP: ${Math.round(me.health)}%`;
    document.getElementById('ammoCount').textContent = me.ammo;
    document.getElementById('ammoDisplay').querySelector('.label').textContent = `/ ${me.maxAmmo}`;
    document.getElementById('enemyHealthHud').textContent = `${Math.round(enemy.health)}%`;
    document.getElementById('roundHud').textContent = state.round;
    document.getElementById('scoreHud').textContent = `${state.myScore}:${state.enemyScore}`;
}

function addKillFeed(msg) {
    const feed = document.getElementById('killFeed');
    const div = document.createElement('div');
    div.textContent = msg;
    feed.appendChild(div);
    setTimeout(() => div.remove(), 4000);
}

function endRound() {
    const me = state.players.me;
    const enemy = state.players.enemy;
    
    if (state.winner === 'me') {
        addKillFeed(`You eliminated Enemy [${state.myScore}:${state.enemyScore}]`);
    } else {
        addKillFeed(`Enemy eliminated You [${state.myScore}:${state.enemyScore}]`);
        document.getElementById('deathMsg').textContent = 'Снайпер противника был точнее';
        document.getElementById('deathScreen').style.display = 'flex';
        return;
    }
    
    setTimeout(resetRound, 2000);
}

function resetRound() {
    const me = state.players.me;
    const enemy = state.players.enemy;
    
    me.health = me.maxHealth;
    me.ammo = me.maxAmmo;
    me.reloading = false;
    me.reloadTime = 0;
    me.alive = true;
    
    enemy.health = enemy.maxHealth;
    enemy.ammo = enemy.maxAmmo;
    enemy.reloading = false;
    enemy.reloadTime = 0;
    enemy.alive = true;
    
    state.round++;
    state.winner = null;
    bullets = [];
    
    // Respawn
    const mPos = getSniperPos('left', mapData.groundY);
    me.x = mPos.x;
    me.y = mPos.y;
    const ePos = getSniperPos('right', mapData.groundY);
    enemy.x = ePos.x;
    enemy.y = ePos.y;
    
    document.getElementById('reloadIndicator').style.display = 'none';
    document.getElementById('deathScreen').style.display = 'none';
    updateHUD();
    sendState();
}

function requestRestart() {
    send({ type: 'restart_request' });
}

// ====================================================
// NETWORKING (PeerJS)
// ====================================================
function createGame() {
    if (peer) peer.destroy();
    
    setStatus('Создание комнаты...', '');
    
    peer = new Peer(undefined, {
        config: { 'iceServers': [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' }
        ]}
    });
    
    peer.on('open', (id) => {
        myPeerId = id;
        gameId = id.substring(0, 6).toUpperCase();
        
        document.getElementById('menu').innerHTML = `
            <h1>SNIPER BATTLE</h1>
            <div class="subtitle">ОЖИДАНИЕ</div>
            <p style="color:#888;margin:10px 0;">Код комнаты:</p>
            <div id="roomCode">${gameId}</div>
            <button class="btn btn-copy" onclick="copyCode()">Копировать код</button>
            <div id="status" class="status">Ожидаем противника...</div>
            <button class="btn btn-join" style="margin-top:20px;" onclick="backToMenu()">Назад</button>
        `;
        
        setStatus('Ожидаем противника...', '');
        
        peer.on('connection', (c) => {
            conn = c;
            setupConnection();
        });
    });
    
    peer.on('error', (err) => {
        setStatus('Ошибка: ' + err.type, 'error');
    });
}

function joinGame() {
    const code = document.getElementById('joinInput').value.trim().toUpperCase();
    if (code.length < 4) {
        setStatus('Введи код комнаты (4-6 символов)', 'error');
        return;
    }
    
    if (peer) peer.destroy();
    
    setStatus('Подключение...', '');
    
    peer = new Peer(undefined, {
        config: { 'iceServers': [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' }
        ]}
    });
    
    peer.on('open', (id) => {
        myPeerId = id;
        
        // Find the host by their peer ID (code was part of their ID)
        conn = peer.connect(code.toLowerCase() + '_sniper');
        setupConnection();
    });
    
    peer.on('error', (err) => {
        setStatus('Ошибка подключения: ' + err.type, 'error');
    });
}

function setupConnection() {
    conn.on('open', () => {
        setStatus('Подключен!', 'success');
        
        if (conn.peer === myPeerId) {
            // I'm the host - send game info
            startGame('host');
        } else {
            // I'm the joiner - wait for host
            setStatus('Подключен к игре!', 'success');
        }
        
        conn.on('data', (data) => {
            handleData(data);
        });
        
        conn.on('close', () => {
            setStatus('Противник отключился', 'error');
            document.getElementById('game').style.display = 'none';
            document.getElementById('menu').style.display = 'block';
            backToMenu();
        });
    });
    
    conn.on('error', (err) => {
        setStatus('Ошибка соединения', 'error');
    });
}

function handleData(data) {
    switch (data.type) {
        case 'game_start':
            startGame('joiner');
            state.players.me.x = data.myX;
            state.players.me.y = data.myY;
            state.players.enemy.x = data.enemyX;
            state.players.enemy.y = data.enemyY;
            break;
            
        case 'state':
            const e = state.players.enemy;
            e.health = data.health;
            e.ammo = data.ammo;
            e.reloading = data.reloading;
            e.alive = data.alive;
            e.angle = data.angle;
            e.scope = data.scope;
            e.x = data.x;
            e.y = data.y;
            if (data.score !== undefined) state.enemyScore = data.score;
            if (data.round !== undefined) state.round = data.round;
            updateHUD();
            break;
            
        case 'bullet':
            bullets.push({
                x: data.x, y: data.y,
                vx: Math.cos(data.angle) * data.speed,
                vy: Math.sin(data.angle) * data.speed,
                owner: 'enemy',
                scoped: data.scoped,
                life: 3
            });
            break;
            
        case 'reload':
            state.players.enemy.reloading = true;
            state.players.enemy.reloadTime = 2.0;
            break;
            
        case 'restart_request':
            if (state.myScore > state.enemyScore || state.round > 3) {
                resetGame();
            }
            break;
            
        case 'reset_game':
            resetGame();
            break;
    }
}

function send(data) {
    if (conn && conn.open) {
        conn.send(data);
    }
}

function sendState() {
    const me = state.players.me;
    send({
        type: 'state',
        health: me.health,
        ammo: me.ammo,
        reloading: me.reloading,
        alive: me.alive,
        angle: me.angle,
        scope: me.scope,
        x: me.x,
        y: me.y,
        score: state.myScore,
        round: state.round
    });
}

function sendBullet(angle, speed, scoped) {
    const me = state.players.me;
    send({
        type: 'bullet',
        x: me.x + Math.cos(angle) * 40,
        y: me.y + Math.sin(angle) * 40,
        angle: angle,
        speed: speed,
        scoped: scoped
    });
}

// ====================================================
// GAME LIFECYCLE
// ====================================================
function startGame(role) {
    document.getElementById('menu').style.display = 'none';
    document.getElementById('game').style.display = 'block';
    document.getElementById('deathScreen').style.display = 'none';
    
    generateMap();
    
    if (role === 'host') {
        const mPos = getSniperPos('left', mapData.groundY);
        state.players.me.x = mPos.x;
        state.players.me.y = mPos.y;
        const ePos = getSniperPos('right', mapData.groundY);
        state.players.enemy.x = ePos.x;
        state.players.enemy.y = ePos.y;
        
        send({
            type: 'game_start',
            role: 'joiner',
            myX: state.players.enemy.x,
            myY: state.players.enemy.y,
            enemyX: state.players.me.x,
            enemyY: state.players.me.y
        });
    }
    
    updateHUD();
}

function resetGame() {
    state.round = 1;
    state.myScore = 0;
    state.enemyScore = 0;
    state.winner = null;
    bullets = [];
    particles = [];
    
    const me = state.players.me;
    const enemy = state.players.enemy;
    me.health = me.maxHealth;
    me.ammo = me.maxAmmo;
    me.alive = true;
    me.reloading = false;
    enemy.health = enemy.maxHealth;
    enemy.ammo = enemy.maxAmmo;
    enemy.alive = true;
    enemy.reloading = false;
    
    generateMap();
    const mPos = getSniperPos('left', mapData.groundY);
    me.x = mPos.x;
    me.y = mPos.y;
    const ePos = getSniperPos('right', mapData.groundY);
    enemy.x = ePos.x;
    enemy.y = ePos.y;
    
    document.getElementById('deathScreen').style.display = 'none';
    document.getElementById('reloadIndicator').style.display = 'none';
    updateHUD();
    sendState();
}

function copyCode() {
    const code = document.getElementById('roomCode');
    if (code) {
        const range = document.createRange();
        range.selectNode(code);
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(range);
        document.execCommand('copy');
        window.getSelection().removeAllRanges();
        setStatus('Код скопирован!', 'success');
    }
}

function backToMenu() {
    if (conn) { conn.close(); }
    if (peer) { peer.destroy(); }
    conn = null;
    peer = null;
    
    document.getElementById('game').style.display = 'none';
    document.getElementById('menu').style.display = 'block';
    document.getElementById('menu').innerHTML = `
        <h1>SNIPER BATTLE</h1>
        <div class="subtitle">P2P MULTIPLAYER</div>
        <button class="btn btn-create" onclick="createGame()">Создать игру</button>
        <div style="margin: 15px 0; color: #555;">или</div>
        <input id="joinInput" type="text" placeholder="Код комнаты" maxlength="6" oninput="this.value=this.value.toUpperCase()">
        <button class="btn btn-join" onclick="joinGame()">Присоединиться</button>
        <div id="status" class="status">Готов к бою</div>
    `;
    bullets = [];
    particles = [];
}

function setStatus(msg, cls) {
    const el = document.getElementById('status');
    if (el) {
        el.textContent = msg;
        el.className = 'status ' + (cls || '');
    }
}

// ====================================================
// INPUT
// ====================================================
canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    mouse.x = e.clientX - rect.left;
    mouse.y = e.clientY - rect.top;
});

canvas.addEventListener('mousedown', (e) => {
    if (e.button === 2) { mouse.right = true; return; }
    if (gameState === 'playing' || gameState === 'playing') shoot();
});

canvas.addEventListener('mouseup', (e) => {
    if (e.button === 2) mouse.right = false;
});

canvas.addEventListener('contextmenu', (e) => e.preventDefault());

document.addEventListener('keydown', (e) => {
    keys[e.key] = true;
    if (e.key === 'r' || e.key === 'R') startReload();
});

document.addEventListener('keyup', (e) => {
    keys[e.key] = false;
});

// ====================================================
// GAME LOOP
// ====================================================
let lastTime = 0;
function gameLoop(time) {
    const dt = Math.min((time - lastTime) / 1000, 0.05);
    lastTime = time;
    
    if (document.getElementById('game').style.display === 'block') {
        updatePlayer(dt);
        render();
    }
    
    requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);
